name: Deploy WASM REPL to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout etil-web
        uses: actions/checkout@v4

      - name: Checkout ETIL source
        uses: actions/checkout@v4
        with:
          repository: ETIL-ORG/etil
          path: etil-src

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure WASM build
        run: |
          emcmake cmake -B build-wasm -GNinja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build WASM
        run: ninja -C build-wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build

      - name: Stage WASM artifacts
        run: mkdir -p web/wasm && cp build-wasm/etil.js build-wasm/etil.wasm web/wasm/

      - name: Assemble site
        run: |
          mkdir -p _site/dist _site/styles _site/wasm
          cp web/index.html _site/
          cp -r web/styles/* _site/styles/
          cp web/dist/main.js _site/dist/
          cp web/dist/main.css _site/dist/
          cp web/wasm/etil.js _site/wasm/
          cp web/wasm/etil.wasm _site/wasm/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
